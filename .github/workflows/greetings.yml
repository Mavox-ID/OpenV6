name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Hi! Thanks for helping the project identify new bugs or new additions. Wait for the author to check your bug/feature."
        pr-message: "Hey! Thanks for helping the project with something new. Wait for the OpenV6 author to see your first PR!"
